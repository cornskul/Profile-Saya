<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Project 2</title>
  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial, sans-serif;
    }
    html, body{
      overflow-x:hidden;
      scroll-behavior:smooth;
    }
    body{
      background:navajowhite;
      color:#222;
    }
    header{
      background:sandybrown;
      color:white;
      text-align:center;
      padding:45px 20px;
    }
    header h1{
      font-size:42px;
      margin-bottom:10px;
    }
    header h2{
      font-size:22px;
      font-weight:normal;
    }
    .container{
      width:90%;
      max-width:1100px;
      margin:auto;
      padding:50px 0;
    }
    .project-card{
      background:white;
      border-radius:20px;
      padding:35px;
      box-shadow:0 4px 15px rgba(0,0,0,0.08);
      transition:0.3s ease;
    }
    .project-card:hover{
      transform:translateY(-8px) scale(1.01);
      box-shadow:0 10px 25px rgba(0,0,0,0.15);
    }
    .project-card h2{
      font-size:30px;
      margin-bottom:20px;
    }
    .project-card p{
      font-size:18px;
      line-height:1.8;
      margin-bottom:30px;
    }
    .screenshot{
      width:100%;
      border-radius:15px;
      margin-bottom:25px;
    }
    button{
      background:sandybrown;
      color:white;
      border:none;
      padding:14px 24px;
      border-radius:10px;
      cursor:pointer;
      font-size:16px;
      transition:0.3s;
    }
    button:hover{
      background:peru;
      transform:scale(1.05);
    }
    footer{
      background:sandybrown;
      color:white;
      text-align:center;
      padding:20px;
      margin-top:60px;
      font-size:16px;
    }
    @media(max-width:768px){
      header h1{
        font-size:32px;
      }
      header h2{
        font-size:18px;
      }
      .project-card{
        padding:25px;
      }
      .project-card h2{
        font-size:24px;
      }
      .project-card p{
        font-size:16px;
      }
    }
    @media(max-width:480px){
      header{
        padding:35px 15px;
      }
      header h1{
        font-size:28px;
      }
      header h2{
        font-size:16px;
      }
      button{
        width:100%;
      }
    }
  </style>
</head>
<body>
  <header>
    <h1>Project 2</h1>
    <h2>Website Fotografi</h2>
  </header>
  <div class="container">
    <div class="project-card">
      <h2>Deskripsi Project</h2>
      <p>
        Website fotografi ini dibuat sebagai prototipe apabila
        Canilens (komunitas fotografi Kolese Kanisius)
        membutuhkan website untuk menampilkan hasil karya
        foto dari para anggotanya secara modern dan menarik.
      </p>
      <img
      class="screenshot"
      src="homess.JPG">
      <img
      class="screenshot"
      src="whatiscanilensss.JPG">
      <img
      class="screenshot"
      src="registernowss.JPG">
      <button onclick="kembali()">
        Kembali ke Home
      </button>
    </div>
  </div>
  <footer>
    Project 2
  </footer>
  <script>
    console.log("Project 2 Aktif");
    function kembali(){
      window.location.href = "uh.html";
    }
  </script>
</body>
</html>
